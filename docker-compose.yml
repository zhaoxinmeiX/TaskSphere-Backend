services:
  db:
    image: postgres:17-alpine
    container_name: tasksphere_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tasksphere}
      POSTGRES_USER: ${POSTGRES_USER:-tasksphere}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tasksphere}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tasksphere} -d ${POSTGRES_DB:-tasksphere}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - django_net

  web:
    build: .
    container_name: tasksphere-backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-tasksphere_db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-tasksphere}
      POSTGRES_USER: ${POSTGRES_USER:-tasksphere}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tasksphere}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-tasksphere}:${POSTGRES_PASSWORD:-tasksphere}@${POSTGRES_HOST:-tasksphere_db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-tasksphere}}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - django_net

networks:
  django_net:

volumes:
  postgres_data:
